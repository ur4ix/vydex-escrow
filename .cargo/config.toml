# Resolve the whole dependency tree to versions compatible with Solana 1.18's
# platform-tools rustc (1.75). Combined with `rust-version = "1.75.0"` on the
# program crate, cargo's MSRV-aware resolver avoids the newer edition-2024 crates
# that platform-tools cargo cannot parse.
[resolver]
incompatible-rust-versions = "fallback"
