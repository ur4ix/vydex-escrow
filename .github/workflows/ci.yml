name: ci

on:
  push:
  pull_request:

# Uses the prebuilt Anchor toolchain image so build + tests run on a real Linux
# toolchain (the same image can be used locally: `docker run --rm -v "$PWD":/w
# -w /w backpackapp/build:v0.30.1 bash -lc "yarn install && anchor build && anchor test"`).
jobs:
  build-test:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.30.1
    steps:
      - uses: actions/checkout@v4

      - name: Sync program id (replaces the placeholder declare_id!)
        run: anchor keys sync

      - name: Install JS deps
        # The backpack image ships Node 18, but some @solana/* codec deps declare
        # engines >=20. --ignore-engines lets the install proceed (they run fine).
        run: yarn install --ignore-engines

      - name: Diagnose Rust env
        run: |
          set +e
          echo "HOME=$HOME CARGO_HOME=$CARGO_HOME RUSTUP_HOME=$RUSTUP_HOME"
          echo "PATH=$PATH"
          echo "-- which --"; command -v rustc cargo rustup cargo-build-sbf anchor
          echo "-- rustup show --"; rustup show
          for d in /root /usr/local /home/runner /github/home; do
            echo "[$d]"; ls -la "$d/.rustup/toolchains" 2>/dev/null; ls -la "$d/.cargo/bin/rustc" 2>/dev/null
          done
          echo "-- /usr/local/rustup --"; ls -la /usr/local/rustup/toolchains 2>/dev/null
          echo "-- /usr/local/cargo/bin --"; ls /usr/local/cargo/bin 2>/dev/null | head
          true

      - name: anchor build
        run: anchor build

      - name: clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      # Tests run on solana-bankrun (loads the built program, warps the clock for
      # the timeout scenarios) — no local validator needed.
      - name: tests (bankrun)
        run: yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        # The two ignored advisories are in curve25519-dalek / ed25519-dalek,
        # pinned transitively by the Solana SDK (not this repo's code) and not
        # fixable without a Solana bump. Everything else must pass. See audit.toml.
        run: cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093
