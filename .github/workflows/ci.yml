name: ci

on:
  push:
  pull_request:

# Uses the prebuilt Anchor toolchain image so build + tests run on a real Linux
# toolchain (the same image can be used locally: `docker run --rm -v "$PWD":/w
# -w /w backpackapp/build:v0.30.1 bash -lc "yarn install && anchor build && anchor test"`).
jobs:
  build-test:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.30.1
    # GitHub sets HOME=/github/home, but the image installed rust under /root.
    # Point rustup/cargo at the image's toolchains so anchor build / clippy work.
    env:
      RUSTUP_HOME: /root/.rustup
      CARGO_HOME: /root/.cargo
    steps:
      - uses: actions/checkout@v4

      - name: Sync program id (replaces the placeholder declare_id!)
        run: anchor keys sync

      - name: Install JS deps
        # The backpack image ships Node 18, but some @solana/* codec deps declare
        # engines >=20. --ignore-engines lets the install proceed (they run fine).
        run: yarn install --ignore-engines

      - name: Install a current Rust host toolchain
        # The image's stable is 1.79 (no edition-2024), but several build-time deps
        # now require it. Fetch the current stable for the HOST build (proc macros,
        # cargo metadata); on-chain code is still built by Solana platform-tools.
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable
          rustc --version && cargo --version

      - name: Resolve deps for Solana 1.18 platform-tools
        # platform-tools cargo (1.75) parses every manifest in the graph and can't
        # handle edition-2024 build deps. Hold the two proc-macro chains that pull
        # them (proc-macro-crate → toml_edit 1.x; zeroize_derive 1.5) at their last
        # edition-2021 releases, then downgrade the lockfile header to v3.
        run: |
          cargo generate-lockfile
          cargo update -p proc-macro-crate --precise 3.1.0
          cargo update -p zeroize_derive --precise 1.4.2
          sed -i 's/^version = 4$/version = 3/' Cargo.lock
          head -n 3 Cargo.lock

      - name: anchor build
        run: anchor build

      - name: clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      # Tests run on solana-bankrun (loads the built program, warps the clock for
      # the timeout scenarios) — no local validator needed.
      - name: tests (bankrun)
        run: yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        # The two ignored advisories are in curve25519-dalek / ed25519-dalek,
        # pinned transitively by the Solana SDK (not this repo's code) and not
        # fixable without a Solana bump. Everything else must pass. See audit.toml.
        run: cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093
