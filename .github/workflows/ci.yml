name: ci

on:
  push:
  pull_request:

# No prebuilt Anchor image exists for 1.x, and the older ones ship Solana 1.18
# platform-tools (rust 1.75) which cannot build today's edition-2024 crates.
# So we install a current Rust + Agave + Anchor toolchain explicitly.
jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      ANCHOR_VERSION: 1.1.2
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: System deps for anchor-cli
        run: sudo apt-get update && sudo apt-get install -y pkg-config build-essential libudev-dev

      - name: Cache cargo (anchor-cli binary + registry)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-anchor-${{ env.ANCHOR_VERSION }}-${{ runner.os }}

      - name: Install Solana (Agave)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          if ! command -v anchor >/dev/null; then
            cargo install anchor-cli --version "$ANCHOR_VERSION" --locked
          fi

      - name: Toolchain versions
        run: |
          rustc --version
          solana --version
          anchor --version
          cargo-build-sbf --version || true

      - name: Sync program id (replaces the placeholder declare_id!)
        run: anchor keys sync

      - name: Install JS deps
        run: yarn install

      - name: anchor build
        run: anchor build

      - name: clippy (deny warnings)
        # unexpected_cfgs fires inside Anchor's own #[program] macro expansion
        # (custom-heap / custom-panic / anchor-debug / solana) — not this crate's
        # code, and not silenceable from here. Everything else stays denied.
        run: cargo clippy --all-targets -- -D warnings -A unexpected_cfgs

      # Tests run on solana-bankrun (loads the built program, warps the clock for
      # the timeout scenarios) — no local validator needed.
      - name: tests (bankrun)
        run: yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        # The two ignored advisories are in curve25519-dalek / ed25519-dalek,
        # pinned transitively by the Solana SDK (not this repo's code) and not
        # fixable without a Solana bump. Everything else must pass. See audit.toml.
        run: cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093
